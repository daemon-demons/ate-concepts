    <rect x="710" y="265" width="55" height="40" rx="3" fill="#134e4a" />
    <rect x="775" y="265" width="55" height="40" rx="3" fill="#0f172a" /><text x="802" y="290" fill="#5eead4" font-size="9" text-anchor="middle">S16</text>
  </g>
  <rect x="600" y="315" width="250" height="28" rx="4" fill="#ccfbf1" stroke="#0d9488" stroke-width="1" />
  <text x="725" y="334" fill="#0f766e" font-size="11" font-weight="500" text-anchor="middle">N x throughput per handler index</text>
  <text x="500" y="385" fill="#475569" font-size="12" font-weight="500" text-anchor="middle">Same test program, deterministic timing, synchronized instrumentation</text>
