      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.1" />
    </filter>
  </defs>
  <rect width="1000" height="400" fill="#ffffff" />
  <g stroke="#f1f5f9" stroke-width="1">
