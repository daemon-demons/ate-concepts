  <g>
    <rect x="580" y="165" width="55" height="40" rx="3" fill="#0f172a" /><text x="607" y="190" fill="#5eead4" font-size="9" text-anchor="middle">S1</text>
    <rect x="645" y="165" width="55" height="40" rx="3" fill="#0f172a" /><text x="672" y="190" fill="#5eead4" font-size="9" text-anchor="middle">S2</text>
    <rect x="710" y="165" width="55" height="40" rx="3" fill="#0f172a" /><text x="737" y="190" fill="#5eead4" font-size="9" text-anchor="middle">S3</text>
    <rect x="775" y="165" width="55" height="40" rx="3" fill="#0f172a" /><text x="802" y="190" fill="#5eead4" font-size="9" text-anchor="middle">S4</text>
    <rect x="580" y="215" width="55" height="40" rx="3" fill="#0f172a" /><text x="607" y="240" fill="#5eead4" font-size="9" text-anchor="middle">S5</text>
    <rect x="645" y="215" width="55" height="40" rx="3" fill="#0f172a" /><text x="672" y="240" fill="#5eead4" font-size="9" text-anchor="middle">S6</text>
    <rect x="710" y="215" width="55" height="40" rx="3" fill="#0f172a" /><text x="737" y="240" fill="#5eead4" font-size="9" text-anchor="middle">S7</text>
    <rect x="775" y="215" width="55" height="40" rx="3" fill="#0f172a" /><text x="802" y="240" fill="#5eead4" font-size="9" text-anchor="middle">S8</text>
    <rect x="580" y="265" width="55" height="40" rx="3" fill="#134e4a" /><text x="607" y="290" fill="#5eead4" font-size="9" text-anchor="middle">...</text>
