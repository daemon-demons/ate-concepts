<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
	
	<defs>
		<!-- Arrowhead Marker -->
		<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
			<path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
		</marker>

		<!-- Drop Shadow for Components -->
		<filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
			<feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.1" />
		</filter>
		
		<!-- Glowing Signal Trace -->
		<filter id="glow">
			<feGaussianBlur stdDeviation="2" result="coloredBlur"/>
			<feMerge>
				<feMergeNode in="coloredBlur"/>
				<feMergeNode in="SourceGraphic"/>
			</feMerge>
		</filter>
	</defs>

	<!-- ================= BACKGROUND & GRID ================= -->
	<!-- Clean white background (no border) -->
	<rect width="1000" height="450" fill="#ffffff" />
	
	<!-- Subtle architectural grid -->
	<g stroke="#f1f5f9" stroke-width="1">
		<line x1="0" y1="50" x2="1000" y2="50" />
		<line x1="0" y1="100" x2="1000" y2="100" />
		<line x1="0" y1="150" x2="1000" y2="150" />
		<line x1="0" y1="200" x2="1000" y2="200" />
		<line x1="0" y1="250" x2="1000" y2="250" />
		<line x1="0" y1="300" x2="1000" y2="300" />
		<line x1="0" y1="350" x2="1000" y2="350" />
		<line x1="0" y1="400" x2="1000" y2="400" />
		
		<line x1="100" y1="0" x2="100" y2="450" />
		<line x1="250" y1="0" x2="250" y2="450" />
		<line x1="400" y1="0" x2="400" y2="450" />
		<line x1="550" y1="0" x2="550" y2="450" />
		<line x1="700" y1="0" x2="700" y2="450" />
		<line x1="850" y1="0" x2="850" y2="450" />
	</g>

	<!-- ================= TIMING BOUNDARIES ================= -->
	<g stroke="#94a3b8" stroke-dasharray="6,4" stroke-width="1.5">
		<!-- t=0ns Pogo Pin Boundary -->
		<line x1="280" y1="110" x2="280" y2="390" />
		<!-- t=FXDL Socket Boundary -->
		<line x1="740" y1="110" x2="740" y2="390" />
	</g>

	<!-- ================= HARDWARE COMPONENTS ================= -->
	
	<!-- 1. ATE Tester Block -->
	<rect x="40" y="140" width="180" height="180" rx="6" fill="#1e293b" filter="url(#shadow)" />
	<rect x="50" y="150" width="160" height="160" rx="4" fill="#334155" />
	<text x="130" y="225" fill="#f8fafc" font-size="16" font-weight="400" text-anchor="middle" letter-spacing="0.5">ATE TESTER</text>
	<text x="130" y="245" fill="#94a3b8" font-size="12" font-weight="300" text-anchor="middle">(PPMU)</text>
	
	<!-- ATE Internal Circuitry Hint -->
	<path d="M 70 270 L 90 270 L 100 250 L 120 250 L 130 270 L 180 270" fill="none" stroke="#64748b" stroke-width="1.5" />
	<circle cx="180" cy="270" r="3" fill="#cbd5e1" />

	<!-- 2. Pogo Pins -->
	<!-- Top Pin -->
	<rect x="220" y="195" width="40" height="8" rx="2" fill="#eab308" />
	<rect x="260" y="196" width="20" height="6" rx="3" fill="#fef08a" />
	<!-- Middle Pin (Active Signal) -->
	<rect x="220" y="225" width="40" height="10" rx="2" fill="#eab308" />
	<rect x="260" y="226" width="20" height="8" rx="4" fill="#fef08a" />
	<!-- Bottom Pin -->
	<rect x="220" y="255" width="40" height="8" rx="2" fill="#eab308" />
	<rect x="260" y="256" width="20" height="6" rx="3" fill="#fef08a" />

	<!-- 3. Device Interface Board (DIB) -->
	<rect x="330" y="120" width="360" height="220" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)" />
	<text x="510" y="150" fill="#0369a1" font-size="14" font-weight="500" text-anchor="middle" letter-spacing="1">DEVICE INTERFACE BOARD (DIB)</text>
	
	<!-- DIB Connectors (Left & Right) -->
	<rect x="310" y="180" width="20" height="100" rx="2" fill="#94a3b8" />
	<rect x="690" y="180" width="20" height="100" rx="2" fill="#94a3b8" />
	
	<!-- DIB Internal Traces (Inactive) -->
	<path d="M 330 200 L 400 200 L 430 170 L 600 170 L 630 200 L 690 200" fill="none" stroke="#bae6fd" stroke-width="3" />
	<path d="M 330 260 L 400 260 L 430 290 L 600 290 L 630 260 L 690 260" fill="none" stroke="#bae6fd" stroke-width="3" />
	
	<!-- DIB Matching Network Components -->
	<rect x="460" y="165" width="30" height="10" fill="#0284c7" />
	<rect x="460" y="285" width="30" height="10" fill="#0284c7" />

	<!-- 4. Test Socket -->
	<rect x="730" y="160" width="40" height="140" rx="4" fill="#475569" filter="url(#shadow)" />
	<text x="750" y="235" fill="#f8fafc" font-size="11" font-weight="400" text-anchor="middle" transform="rotate(-90 750,235)">SOCKET</text>

	<!-- 5. DUT (Device Under Test) -->
	<rect x="810" y="150" width="120" height="120" rx="4" fill="#0f172a" filter="url(#shadow)" />
	<rect x="820" y="160" width="100" height="100" rx="2" fill="#1e293b" />
	<text x="870" y="215" fill="#f8fafc" font-size="14" font-weight="500" text-anchor="middle">DUT</text>
	<text x="870" y="235" fill="#94a3b8" font-size="11" font-weight="300" text-anchor="middle">(CHIP)</text>
	
	<!-- DUT Pins -->
	<path d="M 800 170 h 10 m -10 15 h 10 m -10 15 h 10 m -10 15 h 10 m -10 15 h 10 m -10 15 h 10" stroke="#cbd5e1" stroke-width="2" />
	<path d="M 930 170 h 10 m -10 15 h 10 m -10 15 h 10 m -10 15 h 10 m -10 15 h 10 m -10 15 h 10" stroke="#cbd5e1" stroke-width="2" />

	<!-- ================= SIGNAL PATH & WAVEFORMS ================= -->
	
	<!-- Active Signal Trace (Glowing) -->
	<path d="M 180 230 L 280 230 L 330 230 L 400 230 L 450 205 L 570 205 L 620 230 L 730 230 L 800 230" fill="none" stroke="#22c55e" stroke-width="3" filter="url(#glow)" />
	
	<!-- Launcher Waveform (Clean, at ATE Output) -->
	<g transform="translate(190, 70)">
		<text x="20" y="-10" fill="#334155" font-size="12" font-weight="400">Launcher Signal</text>
		<path d="M 0 30 L 20 30 L 25 0 L 55 0 L 60 30 L 80 30" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round" />
	</g>

	<!-- Arriving Waveform (Delayed & Degraded, at DUT) -->
	<g transform="translate(770, 70)">
		<text x="20" y="-10" fill="#334155" font-size="12" font-weight="400">Arriving Signal</text>
		<path d="M -20 30 L 40 30 L 50 5 L 75 5 L 85 30 L 105 30" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linejoin="round" />
		
		<!-- Delta T Illustration -->
		<line x1="22.5" y1="0" x2="22.5" y2="40" stroke="#cbd5e1" stroke-dasharray="2,2" />
		<line x1="62.5" y1="0" x2="62.5" y2="40" stroke="#cbd5e1" stroke-dasharray="2,2" />
		<path d="M 27 20 L 57 20" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)" />
		<text x="42" y="15" fill="#ef4444" font-size="10" font-weight="500" text-anchor="middle">ΔT</text>
	</g>

	<!-- ================= LABELS & MEASUREMENTS ================= -->
	
	<!-- Pogo Pin Label -->
	<rect x="250" y="325" width="60" height="24" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
	<text x="280" y="342" fill="#0f172a" font-size="12" font-weight="500" text-anchor="middle">t = 0ns</text>
	<text x="280" y="370" fill="#64748b" font-size="11" font-weight="400" text-anchor="middle">Calibration Zero</text>

	<!-- DUT Socket Label -->
	<rect x="705" y="325" width="70" height="24" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
	<text x="740" y="342" fill="#0f172a" font-size="12" font-weight="500" text-anchor="middle">t = FXDL</text>
	<text x="740" y="370" fill="#64748b" font-size="11" font-weight="400" text-anchor="middle">Target Arrival</text>

	<!-- Bottom Measurement Bracket -->
	<path d="M 280 410 L 280 420 L 740 420 L 740 410" fill="none" stroke="#64748b" stroke-width="1.5" />
	<path d="M 280 420 L 740 420" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)" />
	
	<rect x="430" y="408" width="160" height="24" fill="#ffffff" />
	<text x="510" y="425" fill="#0f172a" font-size="14" font-weight="500" text-anchor="middle">Fixture Delay (ΔT)</text>

</svg>