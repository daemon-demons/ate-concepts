<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.1" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1000" height="450" fill="#ffffff" />
  <g stroke="#f1f5f9" stroke-width="1">
    <line x1="0" y1="50" x2="1000" y2="50" /><line x1="0" y1="100" x2="1000" y2="100" />
    <line x1="0" y1="150" x2="1000" y2="150" /><line x1="0" y1="200" x2="1000" y2="200" />
    <line x1="0" y1="250" x2="1000" y2="250" /><line x1="0" y1="300" x2="1000" y2="300" />
    <line x1="0" y1="350" x2="1000" y2="350" /><line x1="0" y1="400" x2="1000" y2="400" />
    <line x1="100" y1="0" x2="100" y2="450" /><line x1="250" y1="0" x2="250" y2="450" />
    <line x1="400" y1="0" x2="400" y2="450" /><line x1="550" y1="0" x2="550" y2="450" />
    <line x1="700" y1="0" x2="700" y2="450" /><line x1="850" y1="0" x2="850" y2="450" />
  </g>
  <rect x="40" y="120" width="130" height="100" rx="6" fill="#1e293b" filter="url(#shadow)" />
  <text x="105" y="165" fill="#f8fafc" font-size="14" font-weight="500" text-anchor="middle">SMU</text>
  <text x="105" y="185" fill="#94a3b8" font-size="11" text-anchor="middle">V / I force</text>
  <text x="105" y="205" fill="#64748b" font-size="10" text-anchor="middle">IDD sweep</text>
  <rect x="40" y="260" width="130" height="100" rx="6" fill="#334155" filter="url(#shadow)" />
  <text x="105" y="305" fill="#f8fafc" font-size="14" font-weight="500" text-anchor="middle">SCOPE</text>
  <text x="105" y="325" fill="#94a3b8" font-size="11" text-anchor="middle">Timing</text>
  <text x="105" y="345" fill="#64748b" font-size="10" text-anchor="middle">Eye / jitter</text>
  <rect x="320" y="140" width="360" height="200" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)" />
  <text x="500" y="175" fill="#0369a1" font-size="14" font-weight="500" text-anchor="middle" letter-spacing="1">EVALUATION BOARD</text>
  <rect x="420" y="200" width="160" height="100" rx="4" fill="#0f172a" filter="url(#shadow)" />
  <rect x="430" y="210" width="140" height="80" rx="2" fill="#1e293b" />
  <text x="500" y="255" fill="#f8fafc" font-size="13" font-weight="500" text-anchor="middle">SoC / DUT</text>
  <text x="500" y="275" fill="#94a3b8" font-size="10" text-anchor="middle">Socketed</text>
  <circle cx="400" cy="230" r="5" fill="#eab308" stroke="#ca8a04" stroke-width="1" />
  <circle cx="400" cy="270" r="5" fill="#eab308" stroke="#ca8a04" stroke-width="1" />
  <circle cx="600" cy="230" r="5" fill="#eab308" stroke="#ca8a04" stroke-width="1" />
  <circle cx="600" cy="270" r="5" fill="#eab308" stroke="#ca8a04" stroke-width="1" />
  <text x="500" y="320" fill="#0284c7" font-size="10" text-anchor="middle">Probe / BNC access points</text>
  <rect x="830" y="190" width="130" height="100" rx="6" fill="#475569" filter="url(#shadow)" />
  <text x="895" y="235" fill="#f8fafc" font-size="14" font-weight="500" text-anchor="middle">ANALYZER</text>
  <text x="895" y="255" fill="#94a3b8" font-size="11" text-anchor="middle">Protocol / RF</text>
  <text x="895" y="275" fill="#64748b" font-size="10" text-anchor="middle">Functional</text>
  <path d="M 170 170 L 250 170 L 320 230" fill="none" stroke="#3b82f6" stroke-width="2.5" filter="url(#glow)" marker-end="url(#arrow)" />
  <path d="M 170 310 L 250 310 L 320 270" fill="none" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)" marker-end="url(#arrow)" />
  <path d="M 680 250 L 760 250 L 830 240" fill="none" stroke="#a855f7" stroke-width="2.5" filter="url(#glow)" marker-end="url(#arrow)" />
  <g transform="translate(200, 55)">
    <text x="0" y="0" fill="#334155" font-size="11">Parametric sweep</text>
    <path d="M 0 20 L 30 20 L 35 5 L 55 5 L 60 20 L 90 20" fill="none" stroke="#3b82f6" stroke-width="2" />
  </g>
  <rect x="280" y="395" width="440" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="500" y="414" fill="#475569" font-size="12" font-weight="500" text-anchor="middle">Single-site, engineer-paced, deep electrical visibility</text>
</svg>
