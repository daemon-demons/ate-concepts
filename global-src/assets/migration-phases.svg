<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.1" />
    </filter>
  </defs>
  <rect width="1000" height="280" fill="#ffffff" />
  <g stroke="#f1f5f9" stroke-width="1">
    <line x1="0" y1="40" x2="1000" y2="40" /><line x1="0" y1="80" x2="1000" y2="80" />
    <line x1="0" y1="120" x2="1000" y2="120" /><line x1="0" y1="160" x2="1000" y2="160" />
    <line x1="0" y1="200" x2="1000" y2="200" /><line x1="0" y1="240" x2="1000" y2="240" />
    <line x1="125" y1="0" x2="125" y2="280" /><line x1="375" y1="0" x2="375" y2="280" />
    <line x1="625" y1="0" x2="625" y2="280" /><line x1="875" y1="0" x2="875" y2="280" />
  </g>
  <text x="500" y="28" fill="#64748b" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="1">BENCH-TO-ATE PROGRAM TRANSFER GATES</text>
  <circle cx="70" cy="100" r="22" fill="#0891b2" />
  <text x="70" y="106" fill="#fff" font-size="16" font-weight="600" text-anchor="middle">1</text>
  <rect x="30" y="130" width="180" height="100" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)" />
  <text x="120" y="158" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">FEASIBILITY</text>
  <text x="120" y="178" fill="#64748b" font-size="10" text-anchor="middle">Pin count, speed, RF/MS</text>
  <text x="120" y="198" fill="#64748b" font-size="10" text-anchor="middle">Test time vs CoT</text>
  <text x="120" y="218" fill="#64748b" font-size="10" text-anchor="middle">Tester resource match</text>
  <path d="M 215 180 L 245 180" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <circle cx="280" cy="100" r="22" fill="#0891b2" />
  <text x="280" y="106" fill="#fff" font-size="16" font-weight="600" text-anchor="middle">2</text>
  <rect x="250" y="130" width="180" height="100" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)" />
  <text x="340" y="158" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">PREREQUISITES</text>
  <text x="340" y="178" fill="#64748b" font-size="10" text-anchor="middle">Golden device</text>
  <text x="340" y="198" fill="#64748b" font-size="10" text-anchor="middle">Frozen test spec</text>
  <text x="340" y="218" fill="#64748b" font-size="10" text-anchor="middle">Sim vectors from EDA</text>
  <path d="M 435 180 L 465 180" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <circle cx="500" cy="100" r="22" fill="#0891b2" />
  <text x="500" y="106" fill="#fff" font-size="16" font-weight="600" text-anchor="middle">3</text>
  <rect x="470" y="130" width="180" height="100" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)" />
  <text x="560" y="158" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">TRANSFER</text>
  <text x="560" y="178" fill="#64748b" font-size="10" text-anchor="middle">Loadboard / DIB</text>
  <text x="560" y="198" fill="#64748b" font-size="10" text-anchor="middle">ATE test program</text>
  <text x="560" y="218" fill="#64748b" font-size="10" text-anchor="middle">SmarTest / UltraFLEX</text>
  <path d="M 655 180 L 685 180" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <circle cx="720" cy="100" r="22" fill="#0891b2" />
  <text x="720" y="106" fill="#fff" font-size="16" font-weight="600" text-anchor="middle">4</text>
  <rect x="690" y="130" width="180" height="100" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)" />
  <text x="780" y="158" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">CORRELATION</text>
  <text x="780" y="178" fill="#64748b" font-size="10" text-anchor="middle">Bench-ATE handshake</text>
  <text x="780" y="198" fill="#64748b" font-size="10" text-anchor="middle">Parasitics, ground bounce</text>
  <text x="780" y="218" fill="#64748b" font-size="10" text-anchor="middle">Bandwidth limits</text>
  <path d="M 875 180 L 905 180" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="910" y="155" width="70" height="50" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="2" />
  <text x="945" y="185" fill="#047857" font-size="11" font-weight="600" text-anchor="middle">HVM</text>
</svg>
